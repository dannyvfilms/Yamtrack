{% load app_tags %}
{% load user_tags %}

<div x-data="{
       showRatingPopup: false,
       rating: {% if ep_score is not None %}{{ ep_score|score_display:user }}{% else %}null{% endif %},
       ratingScaleMax: {{ user|rating_scale_max }},
       hoverRating: null,
       isHovering: false,
       formatRating(v) { return v !== null && v !== undefined ? (this.ratingScaleMax === 5 ? String(v) + '/5' : String(v)) : ''; }
     }"
     class="relative">
  <button type="button"
          @click="showRatingPopup = !showRatingPopup"
          title="{% if rating_kind == 'episode' %}Rate episode{% elif rating_kind == 'music' %}Rate track{% else %}Rate item{% endif %}"
          :class="rating !== null
            ? 'border-amber-400/28 bg-amber-500/14 hover:bg-amber-500/20'
            : 'border-gray-400/28 bg-gray-500/14 hover:bg-gray-500/20'"
          class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full border shadow-sm transition-colors duration-200 cursor-pointer">
    <span x-show="rating === null">{% include "app/icons/star.svg" with classes="h-3.5 w-3.5 text-gray-300" %}</span>
    <span x-show="rating !== null" class="text-xs font-semibold text-amber-300 leading-none" x-text="rating" style="display:none">{% if ep_score is not None %}{{ ep_score|score_display:user }}{% endif %}</span>
  </button>

  <div x-show="showRatingPopup"
       @click.outside="showRatingPopup = false; isHovering = false"
       class="absolute right-0 top-full mt-2 w-[250px] rounded-lg border border-gray-700 bg-[#2a2f35] p-3 shadow-lg z-50"
       @mouseenter="isHovering = true"
       @mouseleave="isHovering = false; hoverRating = null">
    <div class="flex justify-between mb-1">
      {% with rating_range=user|rating_scale_max|get_range %}
        {% for rating_value in rating_range %}
          <button @click="if (rating == {{ rating_value }}) { rating = null; } else { rating = {{ rating_value }}; } showRatingPopup = false; isHovering = false"
                  @mouseenter="hoverRating = {{ rating_value }}"
                  {% if rating_kind == "episode" %}
                    hx-post="{% url 'update_episode_score' episode_score_target_id episode.episode_number %}"
                  {% elif rating_kind == "music" %}
                    hx-post="{% url 'update_track_score' music_instance.id %}"
                  {% else %}
                    hx-post="{% url 'update_media_score' action_media_type rating_instance.id %}"
                  {% endif %}
                  hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                  hx-vals='{"score": {{ rating_value }}, "toggle": true}'
                  hx-trigger="click"
                  hx-swap="none"
                  class="focus:outline-none flex flex-col items-center cursor-pointer">
            <div :class="{ 'text-yellow-400': {{ rating_value }} <= (isHovering ? hoverRating : rating), 'text-gray-600': {{ rating_value }} > (isHovering ? hoverRating : rating) }">
              {% include "app/icons/star.svg" with classes="w-5 h-5 hover:scale-110 transition-transform" %}
            </div>
            <span class="text-xs mt-1 text-gray-400">{{ rating_value }}</span>
          </button>
        {% endfor %}
      {% endwith %}
    </div>
  </div>
</div>
