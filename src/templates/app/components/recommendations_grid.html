{% load app_tags %}
{% load user_tags %}

{% for result in media_list.items %}
  {% if result.media_id and result.source and result.media_type %}
    <div class="{{ media_list.card_width_class|default:'w-36' }} shrink-0">
      <div class="media-card bg-[#2a2f35] rounded-lg overflow-hidden shadow-lg relative search-result-card group{% if user.media_card_subtitle_display == 'always' %} media-card-subtitle-always{% endif %}">
        <a href="{% url 'media_details' source=result.source media_type=result.media_type media_id=result.media_id title=result.title|slug %}">
          <img alt="{{ result.title|default:'Unknown' }}"
               class="media-card-poster lazyload w-full aspect-[2/3] bg-[#3e454d] {% if result.image and result.image != IMG_NONE %}object-cover{% endif %}"
               data-src="{{ result.image|default:IMG_NONE }}"
               src="{{ IMG_NONE }}">
        </a>
        <div class="media-card-body p-3 bg-card-body">
          <a href="{% url 'media_details' source=result.source media_type=result.media_type media_id=result.media_id title=result.title|slug %}"
             class="media-card-title text-sm font-semibold text-white hover:text-indigo-400 transition duration-300 line-clamp-1 block min-w-0"
             title="{{ result.title }}">{{ result.title|default:"Unknown" }}</a>
          <p class="media-card-year text-xs text-gray-400 mt-1 line-clamp-1">
            {% if result.year %}{{ result.year }}{% endif %}
          </p>
        </div>
      </div>
    </div>
  {% endif %}
{% endfor %}
