<script>
  function buildMediaListFilterParams(form, overrides = {}) {
    const params = new URLSearchParams();
    if (!form) {
      return params;
    }

    const omitDefaults = {
      status: 'all',
      rating: 'all',
      collection: 'all',
      progress: 'all',
      release: 'all',
    };

    Array.from(form.elements).forEach((field) => {
      if (!field || !field.name || field.disabled) {
        return;
      }

      const hasOverride = Object.prototype.hasOwnProperty.call(overrides, field.name);
      const rawValue = hasOverride ? overrides[field.name] : field.value;
      if (rawValue === null || rawValue === undefined) {
        return;
      }

      const value = String(rawValue).trim();
      if (!value) {
        return;
      }

      const omittedDefault = omitDefaults[field.name];
      if (omittedDefault && value.toLowerCase() === omittedDefault) {
        return;
      }

      params.set(field.name, value);
    });

    return params;
  }

  function buildMediaListHref(listPath, form, overrides = {}) {
    const params = buildMediaListFilterParams(form, overrides);
    const query = params.toString();
    return query ? `${listPath}?${query}` : listPath;
  }
</script>

<script>
  function mediaFilterMenu() {
    const dataEl = document.getElementById('media-filter-data');
    const data = dataEl ? JSON.parse(dataEl.textContent) : {};

      countries: data.countries || [],
      platforms: data.platforms || [],
      origins: data.origins || [],
      formats: data.formats || [],
      authors: data.authors || [],
      tags: data.tags || [],

        this.sourceSearch = '';
