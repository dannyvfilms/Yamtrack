{% if media_type_breakdown %}
<div class="relative shrink-0"
     x-data="{ open: false, _t: null }"
     @mouseenter="clearTimeout(_t); open = true"
     @mouseleave="_t = setTimeout(() => { open = false }, 150)">
  <button class="h-10 w-10 inline-flex items-center justify-center rounded-md border border-white/10 bg-[#2a2f35] text-gray-100 hover:bg-[#343a40] transition-colors cursor-pointer"
          title="Media type breakdown"
          type="button">
    {% include "app/icons/piechart.svg" with classes="w-4 h-4" %}
  </button>
  <div x-show="open"
       x-cloak
       @mouseenter="clearTimeout(_t)"
       @mouseleave="_t = setTimeout(() => { open = false }, 150)"
       x-transition:enter="transition ease-out duration-150"
       x-transition:enter-start="opacity-0 -translate-y-1"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-100"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 -translate-y-1"
       class="absolute left-0 top-full z-20 mt-2 w-64 max-w-[calc(100vw-2rem)] rounded-2xl border border-white/10 bg-[#20252b]/95 p-3 shadow-2xl backdrop-blur-sm">
    <p class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Media Types</p>
    <div class="mb-3 flex h-3 w-full overflow-hidden rounded-full bg-[#39404b]">
      {% for entry in media_type_breakdown %}
        <div style="flex: 0 0 {{ entry.percent }}%; background-color: {{ entry.color }};"></div>
      {% endfor %}
    </div>
    {% for entry in media_type_breakdown %}
      <div class="flex items-center justify-between py-0.5">
        <div class="flex items-center gap-2">
          <span class="block w-3 h-3 rounded-full shrink-0" style="background-color: {{ entry.color }}"></span>
          <span class="text-sm text-gray-200">{{ entry.label }}</span>
        </div>
        <div class="flex items-center gap-1.5">
          <span class="text-sm text-gray-400">{{ entry.count }}</span>
          <span class="text-xs text-gray-500 w-8 text-right">{{ entry.percent }}%</span>
        </div>
      </div>
    {% endfor %}
  </div>
</div>
{% endif %}
